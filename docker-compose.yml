services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: influencerflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d influencerflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/influencerflow
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      DATA_DIR: /data
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/influencerflow
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      DATA_DIR: /data
    volumes:
      - ./api:/app
      - data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A app.workers.celery_app worker --loglevel=info --queues=default

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      API_BASE: http://api:8000
      NEXT_PUBLIC_API_BASE: /api/v1
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    depends_on:
      - api
    command: pnpm dev

volumes:
  postgres_data:
  data:
  web_node_modules:
  web_next:
